<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="header">
                <h1>S N A K E</h1>
                <p>Beat your high score.</p>
            </div>
            <div class="infos">
                <div class="info">
                    <h3>High Score:
                        <span id="high-score">0</span>
                    </h3>
                </div>

                <div class="info">
                    <h3>Score:
                        <span id="score">0</span>
                    </h3>
                </div>

                <div class="info">
                    <h3>Time:
                        <span id="time">00:00</span>
                    </h3>
                </div>
            </div>

            <div class="board"></div>
            <div class="controls">
                <div class="keys">
                    <span class="key" id="up-key">↑</span>
                    <span class="key" id="down-key">↓</span>
                    <span class="key" id="left-key">←</span>
                    <span class="key" id="right-key">→</span>
                </div>

                <p>Use Arrow Keys to Move</p>
            </div>
        </section>
        <div class="modal">
            <div class="start-game">
                <h3>Welcome to the Snake Game</h3>
                <button class="btn btn-start">Start Game</button>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
